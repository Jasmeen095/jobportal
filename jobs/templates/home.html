{% extends 'base.html' %}


{% block content %}
<div class="hero-section text-center mb-5">
    <h1>Find Your Dream Job 🚀</h1>
    <p>Connect with top recruiters and grow your career</p>
</div>

<h2>Availabe Jobs</h2>
{% for job in jobs %}
        <div class="card mb-3">
            <div class="container text-light p-3">
            <h4>{{ job.title }}</h4>
            <p>{{ job.description }}</p>
            <p><strong>Skills: </strong>{{ job.skill_required }}</p>

            <a href="{% url 'apply_job' job.id %}" class="btn btn-primary">Apply</a>
            </div>
        </div>
{% endfor %}

{% endblock content %}
